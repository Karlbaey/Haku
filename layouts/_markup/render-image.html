{{ $alt := .PlainText | default (.Text | plainify) }}
{{ $caption := "" }}
{{ if and $alt (ne $alt "_image") }}
  {{ $caption = $alt }}
{{ end }}

{{ if .IsBlock }}
  <figure class="md-image-figure">
    <img src="{{ .Destination | safeURL }}" alt="{{ $alt | default "" }}" loading="lazy" decoding="async" />
    {{ with $caption }}<figcaption>{{ . }}</figcaption>{{ end }}
  </figure>
{{ else }}
  <img src="{{ .Destination | safeURL }}" alt="{{ $alt | default "" }}" loading="lazy" decoding="async" />
{{ end }}
