{{ if .AlertType }}
  <blockquote class="admonition admonition-{{ .AlertType }}">
    <p class="admonition-title">
      {{ partial "admonition-icon.html" (dict "type" .AlertType) }}
      <span>{{ .AlertTitle | default (humanize .AlertType) }}</span>
    </p>
    {{ .Text | safeHTML }}
  </blockquote>
{{ else }}
  <blockquote>
    {{ .Text | safeHTML }}
  </blockquote>
{{ end }}
