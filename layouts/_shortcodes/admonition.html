{{ $type := .Get "type" | default "note" }}
{{ $title := .Get "title" | default (humanize $type) }}

<blockquote class="admonition admonition-{{ $type }}">
  <p class="admonition-title">
    {{ partial "admonition-icon.html" (dict "type" $type) }}
    <span>{{ $title }}</span>
  </p>
  {{ .Inner | strings.TrimSpace | markdownify }}
</blockquote>
