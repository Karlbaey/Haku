{{ $mainSections := site.Params.mainSections | default site.MainSections | default (slice "articles") }}

<home-search class="home-search" data-search-sections="{{ delimit $mainSections "," }}">
  <button
    type="button"
    class="search-trigger"
    aria-label="打开搜索"
    aria-expanded="false"
    data-search-trigger
  >
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" aria-hidden="true">
      <path
        fill="currentColor"
        d="m19.6 21l-6.3-6.3q-.75.6-1.725.95T9.5 16q-2.725 0-4.612-1.888T3 9.5t1.888-4.612T9.5 3t4.613 1.888T16 9.5q0 1.1-.35 2.075T14.7 13.3l6.3 6.3zM9.5 14q1.875 0 3.188-1.312T14 9.5t-1.312-3.187T9.5 5T6.313 6.313T5 9.5t1.313 3.188T9.5 14"
      />
    </svg>
  </button>

  <div class="search-overlay" hidden data-search-overlay>
    <div class="search-panel" role="dialog" aria-modal="true" aria-labelledby="search-title">
      <header class="search-panel-header">
        <div>
          <p class="search-eyebrow">站内搜索</p>
          <h2 id="search-title" class="search-title">搜索内容</h2>
        </div>
        <button type="button" class="search-close" aria-label="关闭搜索" data-search-close>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M6.53 5.47a.75.75 0 0 1 1.06 0L12 9.88l4.41-4.4a.75.75 0 1 1 1.06 1.06L13.06 10.94l4.4 4.41a.75.75 0 0 1-1.06 1.06L12 12l-4.41 4.4a.75.75 0 0 1-1.06-1.06l4.4-4.4-4.4-4.41a.75.75 0 0 1 0-1.06Z"
              fill="currentColor"
            />
          </svg>
        </button>
      </header>

      <label class="search-input-wrap">
        <span class="visually-hidden">搜索关键词</span>
        <input
          type="search"
          class="search-input"
          placeholder="搜索标题、标签、摘要和正文"
          autocomplete="off"
          spellcheck="false"
          data-search-input
        />
      </label>

      <p class="search-hint" data-search-status>输入关键词开始搜索，按 Esc 退出。</p>
      <ul class="search-results" aria-live="polite" data-search-results></ul>
    </div>
  </div>
</home-search>
