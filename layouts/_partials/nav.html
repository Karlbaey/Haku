      ← 返回首页
    </a>

  <div class="site-nav-links">

    <a href="/friends/" class="site-nav-link">友情链接</a>
    <a href="/rss.xml" class="site-nav-link site-nav-link--icon" aria-label="订阅 RSS" title="RSS 订阅">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" aria-hidden="true">
        <path
          fill="none"
          stroke="currentColor"
          stroke-linecap="round"
          stroke-linejoin="round"

          d="M4 19a1 1 0 1 0 2 0a1 1 0 1 0-2 0M4 4a16 16 0 0 1 16 16M4 11a9 9 0 0 1 9 9"
