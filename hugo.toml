baseURL = "https://re.karlbaey.top/"
languageCode = "zh-CN"
title = "Haku"
enableRobotsTXT = true
disablePathToLower = true

[taxonomies]
tag = "tags"

[pagination]
pagerSize = 7
path = "page"

[outputs]
home = ["HTML", "RSS"]

[outputFormats.RSS]
baseName = "rss"

[params]
subtitle = "卡尔白的纸箱📦"
description = "卡尔白的纸箱📦"

[params.posts]
excerptLength = 60

[params.author]
name = "Karlbaey"

[params.copyright]
enabled = true
license = "cc-by-nc-sa-4.0"

[params.analytics.googleAnalytics]
measurementId = "G-BKJ5EF2BLM"

[params.analytics.umami]
websiteId = "ba106b2c-6b51-4111-880b-cb4f82a84cd3"

[params.friendsApplication]
issueTitlePrefix = "[友链申请]"
issueBodyHeader = "请确认以下信息无误，我会尽快回访。"
buttonLabel = "申请友链"
dialogTitle = "提交友链申请"
dialogDescription = "填写站点信息后，将跳转到 GitHub Issues 页面并自动带上申请内容。"
submitLabel = "发送申请"
cancelLabel = "取消"

[params.friendsApplication.github]
owner = "Karlbaey"
repo = "Karlblogs-Comments"

[params.comments]
defaultProvider = "giscus"

[params.comments.giscus]
enabled = true
repo = "Karlbaey/Karlblogs-Comments"
repoId = "R_kgDON2YNqA"
category = "Announcements"
categoryId = "DIC_kwDON2YNqM4Cm0iB"
mapping = "pathname"
strict = "0"
reactionsEnabled = "1"
inputPosition = "top"
theme = "preferred_color_scheme"
lang = "zh-CN"

[params.comments.waline]
enabled = true
serverUrl = "https://wa.karlbaey.top"
turnstileKey = "0x4AAAAAACjZ2i92lseLg6_w"
lang = "zh"
login = "enable"
requiredMeta = ["nick", "mail"]
emoji = []
pageSize = 10
commentSorting = "latest"

[markup]
  [markup.tableOfContents]
  startLevel = 2
  endLevel = 4
  ordered = false
  [markup.goldmark]
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)']]
    [markup.goldmark.parser]
    wrapStandAloneImageWithinParagraph = false
      [markup.goldmark.parser.attribute]
      block = true
      title = true
    [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
  codeFences = true
  guessSyntax = true
  lineNos = false
  noClasses = true

[frontmatter]
date = ["date", "publishDate", "publishdate", "pubDate", "pubdate"]
lastmod = ["lastmod", "modified", "updated"]
